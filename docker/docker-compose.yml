# Home Assistant — container deployment for dev/test and supervised-style installs.
# For production on dedicated hardware, prefer Home Assistant OS (see docs/home-assistant-setup.md).
services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    restart: unless-stopped
    privileged: true
    # Host networking is recommended for device discovery (Zigbee, mDNS, etc.).
    network_mode: host
    volumes:
      - ha_config:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=America/Los_Angeles

volumes:
  ha_config:
